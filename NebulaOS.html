<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NebulaOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg1:#0f1224; --bg2:#1b1f3b; --accent:#7c5cff; --accent2:#00d9c0;
    --glass: rgba(255,255,255,0.07); --glass-border: rgba(255,255,255,0.14);
    --text:#e9e9f5; --muted:#9aa0c0; --taskbar-h:60px; --menubar-h:30px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;font-family:'Segoe UI',ui-sans-serif,system-ui,Arial,sans-serif;color:var(--text);overflow:hidden;}
  #desktop{
    position:fixed;top:var(--menubar-h);left:0;right:0;bottom:var(--taskbar-h);
    background: radial-gradient(circle at 20% 20%, #29306b 0%, transparent 45%),
                radial-gradient(circle at 80% 70%, #1f5a52 0%, transparent 40%),
                linear-gradient(160deg,var(--bg1),var(--bg2) 60%, #0a0c1a);
    overflow:hidden; user-select:none;
  }
  .stars{position:absolute;inset:0;background-image:
      radial-gradient(1px 1px at 10% 20%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 30% 80%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 70% 30%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 85% 60%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 50% 50%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 90% 15%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 15% 65%, #fff 50%, transparent 51%);
      opacity:.5;}

  /* desktop icons */
  .icons{display:none;}
  .icon{width:78px;text-align:center;cursor:pointer;padding:6px;border-radius:10px;}
  .icon:hover{background:rgba(255,255,255,0.08);}
  .icon .glyph{font-size:30px;display:block;width:48px;height:48px;line-height:48px;margin:0 auto 4px;border-radius:12px;
      background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(6px);}
  .icon .label{font-size:11.5px;color:var(--text);text-shadow:0 1px 3px #000;}

  /* top menu bar */
  #menubar{
    position:fixed;top:0;left:0;right:0;height:var(--menubar-h);z-index:1500;
    background:rgba(10,12,26,0.55);backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border);
    display:flex;align-items:center;padding:0 14px;font-size:12.5px;color:var(--text);
  }
  #menubar .mb-left{display:flex;align-items:center;gap:6px;font-weight:600;letter-spacing:.3px;}
  #menubar .mb-right{margin-left:auto;display:flex;align-items:center;gap:14px;}
  .mb-meter{display:flex;align-items:center;gap:6px;cursor:pointer;padding:3px 8px;border-radius:6px;}
  .mb-meter:hover{background:rgba(255,255,255,0.08);}
  .mb-meter canvas{display:block;width:46px;height:18px;}
  .mb-meter .mb-val{font-size:11px;color:var(--muted);min-width:30px;}
  #mb-clock{color:var(--muted);font-size:12.5px;}

  /* widget panel */
  #widgetPanel{
    position:fixed; top:calc(var(--menubar-h) + 10px); right:14px; width:280px;
    background:rgba(16,18,36,0.82); backdrop-filter:blur(18px);
    border:1px solid var(--glass-border); border-radius:16px; padding:16px;
    display:none; z-index:1400; box-shadow:0 25px 60px rgba(0,0,0,0.5);
  }
  #widgetPanel h4{margin:0 0 4px;font-size:11.5px;color:var(--muted);font-weight:600;letter-spacing:.6px;text-transform:uppercase;}
  .widget-card{background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:12px;padding:12px;margin-bottom:12px;}
  .widget-card:last-child{margin-bottom:0;}
  .widget-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .widget-top .w-label{font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px;}
  .widget-top .w-val{font-size:18px;font-weight:700;}
  .widget-card canvas{width:100%;height:64px;display:block;border-radius:6px;}
  .widget-sub{font-size:10.5px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between;}

  /* dock */
  #dockWrap{display:none;}
  #dock{
    pointer-events:auto;display:flex;align-items:flex-end;gap:10px;padding:8px 14px 6px;
    background:rgba(20,22,42,0.55);backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,0.45);
  }
  .dock-icon{
    position:relative;width:46px;height:46px;border-radius:12px;background:var(--glass);border:1px solid var(--glass-border);
    display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;
    transition:transform .12s ease, width .12s ease, height .12s ease, margin .12s ease;
    transform-origin:bottom center;
  }
  .dock-icon:hover{background:rgba(255,255,255,0.14);}
  .dock-icon .dot{position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--accent2);display:none;}
  .dock-icon.running .dot{display:block;}
  .dock-tip{
    position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
    background:rgba(10,12,26,0.9);border:1px solid var(--glass-border);border-radius:6px;
    padding:3px 9px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;
  }
  .dock-icon:hover .dock-tip{opacity:1;}

  /* taskbar / bottom app bar */
  #taskbar{
    position:fixed;left:0;right:0;bottom:0;height:var(--taskbar-h);
    background:rgba(10,12,26,0.92); backdrop-filter:blur(22px);
    border-top:1px solid var(--glass-border);
    display:flex;align-items:center;gap:4px;padding:0 14px;z-index:1000;
  }
  #startBtn{
    display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--accent),#5a3df0);
    border:none;color:#fff;padding:8px 14px;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px;
    letter-spacing:.3px;box-shadow:0 4px 16px rgba(124,92,255,0.35);
    transition:filter .15s,box-shadow .15s;flex-shrink:0;
  }
  #startBtn:hover{filter:brightness(1.15);box-shadow:0 6px 20px rgba(124,92,255,0.5);}
  /* separator */
  .tb-sep{width:1px;height:32px;background:var(--glass-border);margin:0 6px;flex-shrink:0;}
  /* app icon buttons in taskbar */
  .tb-app-btn{
    position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
    width:48px;height:48px;border-radius:12px;border:1px solid transparent;
    background:var(--glass);cursor:pointer;font-size:20px;
    transition:background .13s,border-color .13s,transform .1s;flex-shrink:0;gap:2px;
  }
  .tb-app-btn:hover{background:rgba(255,255,255,0.13);border-color:var(--glass-border);transform:translateY(-2px);}
  .tb-app-btn.running::after{content:"";position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
    width:4px;height:4px;border-radius:50%;background:var(--accent2);}
  .tb-app-btn .tb-label{font-size:9px;color:var(--muted);letter-spacing:.2px;line-height:1;}
  .tb-app-btn:hover .tb-label{color:var(--text);}
  /* running windows list */
  #taskApps{display:flex;gap:4px;flex:1;overflow-x:auto;padding-left:4px;}
  .taskApp{
    background:var(--glass);border:1px solid var(--glass-border);border-radius:8px;color:var(--text);
    padding:5px 10px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;
    max-width:140px;
  }
  .taskApp.active{background:rgba(124,92,255,0.3);border-color:var(--accent);}
  #clock{margin-left:auto;color:var(--muted);font-size:12px;padding:0 6px;min-width:110px;text-align:right;flex-shrink:0;}

  /* start menu */
  #startMenu{
    position:fixed; bottom:var(--taskbar-h); left:8px; width:300px;
    background:rgba(18,20,40,0.92); backdrop-filter:blur(16px);
    border:1px solid var(--glass-border); border-radius:14px; padding:14px;
    display:none; z-index:1001; box-shadow:0 20px 50px rgba(0,0,0,0.5);
  }
  #startMenu h3{margin:2px 6px 10px;font-size:14px;color:var(--muted);font-weight:600;letter-spacing:.5px;}
  .startItem{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;cursor:pointer;font-size:13.5px;}
  .startItem:hover{background:rgba(255,255,255,0.08);}
  .startItem .g{width:30px;text-align:center;font-size:18px;}
  #startFooter{border-top:1px solid var(--glass-border);margin-top:10px;padding-top:10px;font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between;}

  /* windows */
  .window{
    position:absolute; min-width:320px; min-height:200px;
    background:rgba(20,22,42,0.92); backdrop-filter:blur(10px);
    border:1px solid var(--glass-border); border-radius:12px; overflow:hidden;
    box-shadow:0 25px 60px rgba(0,0,0,0.55); display:flex; flex-direction:column;
  }
  .titlebar{
    height:38px; background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.0));
    display:flex;align-items:center;padding:0 10px;cursor:move;border-bottom:1px solid var(--glass-border);gap:8px;
  }
  .titlebar .ttitle{font-size:12.5px;font-weight:600;flex:1;display:flex;align-items:center;gap:6px;color:var(--text);}
  .winbtn{width:13px;height:13px;border-radius:50%;border:none;cursor:pointer;}
  .winbtn.min{background:#ffbd44;}
  .winbtn.max{background:#00ca56;}
  .winbtn.close{background:#ff605c;}
  .wbody{flex:1;display:flex;flex-direction:column;min-height:0;}
  .resizer{position:absolute;right:0;bottom:0;width:16px;height:16px;cursor:nwse-resize;}

  /* terminal */
  .term{flex:1;background:#0a0c16;color:#c9f7d8;font-family:'Cascadia Code',Consolas,'Courier New',monospace;
        font-size:13.5px;padding:10px 12px;overflow-y:auto;line-height:1.45;}
  .term .line{white-space:pre-wrap;word-break:break-all;}
  .term .prompt{color:#7c5cff;}
  .term .path{color:#00d9c0;}
  .term-input-row{display:flex;}
  .term-input-row input{
    flex:1;background:transparent;border:none;outline:none;color:#e9e9f5;font-family:inherit;font-size:13.5px;
  }
  .err{color:#ff7b7b;}
  .ok{color:#8effa1;}
  .hint{color:#9aa0c0;}

  /* browser */
  .browser-bar{display:flex;align-items:center;gap:6px;padding:8px;background:rgba(255,255,255,0.04);border-bottom:1px solid var(--glass-border);}
  .browser-bar button{background:var(--glass);border:1px solid var(--glass-border);color:var(--text);border-radius:6px;padding:6px 9px;cursor:pointer;font-size:13px;}
  .browser-bar button:hover{background:rgba(255,255,255,0.12);}
  .browser-bar input{flex:1;background:rgba(0,0,0,0.3);border:1px solid var(--glass-border);border-radius:18px;padding:7px 14px;color:var(--text);font-size:13px;outline:none;}
  .browser-frame{flex:1;border:none;width:100%;height:100%;background:#fff;}
  .browser-home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:linear-gradient(160deg,#11132a,#1d2147);color:#e9e9f5;}
  .browser-home h1{font-size:32px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;margin:0;}
  .browser-home .searchbox{width:60%;max-width:480px;display:flex;}
  .browser-home .searchbox input{flex:1;padding:12px 16px;border-radius:24px 0 0 24px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.06);color:#fff;outline:none;font-size:14px;}
  .browser-home .searchbox button{padding:12px 18px;border-radius:0 24px 24px 0;border:1px solid var(--glass-border);background:var(--accent);color:#fff;cursor:pointer;}
  .quicklinks{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
  .qlink{background:var(--glass);border:1px solid var(--glass-border);padding:10px 16px;border-radius:10px;cursor:pointer;font-size:12.5px;}
  .qlink:hover{background:rgba(255,255,255,0.12);}
  .browser-note{font-size:11px;color:var(--muted);max-width:70%;text-align:center;}

  /* file manager */
  .fm{flex:1;display:flex;flex-direction:column;background:#11132a;}
  .fm-path{padding:8px 12px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--glass-border);}
  .fm-grid{flex:1;overflow-y:auto;display:flex;flex-wrap:wrap;gap:14px;padding:16px;align-content:flex-start;}
  .fm-item{width:84px;text-align:center;cursor:pointer;padding:8px 4px;border-radius:8px;}
  .fm-item:hover{background:rgba(255,255,255,0.08);}
  .fm-item .fg{font-size:28px;}
  .fm-item .fl{font-size:11px;word-break:break-all;color:var(--text);}

  /* about / monitor */
  .panel{flex:1;padding:18px;overflow-y:auto;font-size:13px;color:var(--text);}
  .panel h2{margin-top:0;color:var(--accent2);}
  .kv{display:grid;grid-template-columns:140px 1fr;gap:6px 10px;margin:10px 0;}
  .kv b{color:var(--muted);}
  table.proc{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px;}
  table.proc th,table.proc td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--glass-border);}
  table.proc th{color:var(--muted);font-weight:600;}
  .bar-bg{background:rgba(255,255,255,0.08);border-radius:6px;height:8px;overflow:hidden;margin-top:4px;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .killbtn{background:#ff605c;border:none;color:#fff;border-radius:5px;padding:2px 8px;font-size:11px;cursor:pointer;}

  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}

  #bootScreen{position:fixed;inset:0;background:#05060f;color:#9be8c4;z-index:5000;display:none;flex-direction:column;
      align-items:center;justify-content:center;font-family:Consolas,monospace;}
  #bootScreen .logo{font-size:42px;font-weight:700;letter-spacing:2px;margin-bottom:18px;
      background:linear-gradient(90deg,#7c5cff,#00d9c0);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #bootLog{font-size:12.5px;width:420px;height:140px;overflow:hidden;color:#7fdca0;}
  .spinner{width:26px;height:26px;border:3px solid #233;border-top-color:#7c5cff;border-radius:50%;animation:spin 0.8s linear infinite;margin-top:16px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* login / setup screens */
  #authScreen{position:fixed;inset:0;z-index:6000;display:none;align-items:center;justify-content:center;
      background:radial-gradient(circle at 20% 20%, #29306b 0%, transparent 45%),
                 radial-gradient(circle at 80% 70%, #1f5a52 0%, transparent 40%),
                 linear-gradient(160deg,var(--bg1),var(--bg2) 60%, #0a0c1a);
      font-family:'Segoe UI',ui-sans-serif,system-ui,Arial,sans-serif;}
  #authCard{width:340px;background:rgba(18,20,40,0.85);backdrop-filter:blur(16px);border:1px solid var(--glass-border);
      border-radius:18px;padding:32px 28px;box-shadow:0 25px 70px rgba(0,0,0,0.55);text-align:center;}
  #authCard .avatar{width:72px;height:72px;border-radius:50%;margin:0 auto 14px;background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex;align-items:center;justify-content:center;font-size:32px;}
  #authCard h2{margin:0 0 4px;font-size:18px;}
  #authCard .sub{color:var(--muted);font-size:12.5px;margin-bottom:18px;}
  #authCard input{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--glass-border);border-radius:8px;
      padding:11px 14px;color:var(--text);font-size:14px;outline:none;box-sizing:border-box;margin-bottom:10px;text-align:center;
      letter-spacing:2px;}
  #authCard input:focus{border-color:var(--accent);}
  #authCard button.primary{width:100%;background:linear-gradient(135deg,var(--accent),#5a3df0);border:none;color:#fff;
      padding:11px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13.5px;margin-top:4px;}
  #authCard button.primary:hover{filter:brightness(1.1);}
  #authCard .authErr{color:#ff7b7b;font-size:12px;min-height:16px;margin-top:8px;}
  #authCard .authHint{color:var(--muted);font-size:11px;margin-top:14px;line-height:1.5;}
  #authCard .authLink{color:var(--accent2);cursor:pointer;text-decoration:underline;}
  #authCard .strengthBar{height:5px;border-radius:4px;background:rgba(255,255,255,0.08);overflow:hidden;margin:-4px 0 12px;}
  #authCard .strengthBar div{height:100%;width:0%;transition:width .2s;}

  /* ── GEOMETRY SOLVER APP STYLES ─────────────────────────── */
  .geo-wrap{flex:1;display:flex;overflow:hidden;background:#0D1B2A;}
  .geo-toolbar{width:56px;background:#112233;border-right:1px solid #1e3d5c;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:3px;flex-shrink:0;}
  .geo-tool-btn{width:38px;height:38px;border-radius:7px;border:1px solid transparent;background:transparent;color:#7a9bb5;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .14s;font-size:1.1rem;}
  .geo-tool-btn:hover{background:#162b44;color:#F0F4F8;}
  .geo-tool-btn.active{background:rgba(0,212,180,0.12);border-color:#00D4B4;color:#00D4B4;}
  .geo-divider{width:28px;height:1px;background:#1e3d5c;margin:3px 0;}
  .geo-canvas-area{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden;}
  .geo-canvas-bar{display:flex;align-items:center;gap:10px;padding:6px 12px;background:#112233;border-bottom:1px solid #1e3d5c;flex-shrink:0;font-size:11.5px;color:#7a9bb5;font-weight:600;letter-spacing:.04em;}
  .geo-swatch{width:18px;height:18px;border-radius:4px;border:2px solid #1e3d5c;cursor:pointer;transition:border-color .13s;}
  .geo-swatch.sel{border-color:#00D4B4;}
  .geo-canvas-wrap{flex:1;position:relative;overflow:hidden;}
  #geoCanvas{display:block;cursor:crosshair;}
  .geo-coords{position:absolute;bottom:8px;left:12px;font-size:11px;color:#7a9bb5;pointer-events:none;font-family:'Space Grotesk',sans-serif;}
  .geo-side{width:260px;background:#112233;border-left:1px solid #1e3d5c;display:flex;flex-direction:column;flex-shrink:0;}
  .geo-tabs{display:flex;border-bottom:1px solid #1e3d5c;flex-shrink:0;}
  .geo-tab{flex:1;padding:9px 4px;font-size:10.5px;font-weight:600;letter-spacing:.05em;text-align:center;color:#7a9bb5;cursor:pointer;border-bottom:2px solid transparent;transition:all .14s;}
  .geo-tab.active{color:#00D4B4;border-bottom-color:#00D4B4;}
  .geo-panel{flex:1;overflow-y:auto;padding:12px;}
  .geo-panel::-webkit-scrollbar{width:4px;}
  .geo-panel::-webkit-scrollbar-thumb{background:#1e3d5c;border-radius:2px;}
  .geo-shape-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;background:#162b44;margin-bottom:5px;cursor:pointer;border:1px solid transparent;transition:border-color .13s;font-size:12px;}
  .geo-shape-item:hover{border-color:#1e3d5c;}
  .geo-shape-item.sel{border-color:#00D4B4;}
  .geo-shape-del{background:none;border:none;color:#7a9bb5;cursor:pointer;font-size:.85rem;padding:2px 5px;border-radius:4px;}
  .geo-shape-del:hover{color:#ff6b6b;background:rgba(255,107,107,0.1);}
  .geo-measure-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1e3d5c;font-size:11.5px;}
  .geo-measure-row:last-child{border-bottom:none;}
  .geo-mkey{color:#7a9bb5;}
  .geo-mval{color:#00D4B4;font-weight:600;font-family:'Space Grotesk',sans-serif;}
  .geo-hint-card{background:#162b44;border:1px solid #1e3d5c;border-radius:8px;padding:10px 12px;margin-bottom:8px;animation:fadeIn .25s ease;}
  .geo-hint-card.ai-card{border-color:rgba(0,212,180,0.25);}
  .geo-hint-card.user-card{border-color:rgba(255,179,71,0.2);background:rgba(255,179,71,0.05);}
  .geo-hint-tag{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
  .geo-hint-tag.ai{color:#00D4B4;}
  .geo-hint-tag.user{color:#FFB347;}
  .geo-hint-text{font-size:11.5px;line-height:1.5;color:#F0F4F8;}
  .geo-hint-formula{background:rgba(0,212,180,0.08);border:1px solid rgba(0,212,180,0.15);border-radius:5px;padding:4px 8px;margin-top:5px;font-size:11px;color:#00D4B4;white-space:pre-wrap;font-family:'Space Grotesk',monospace;}
  .geo-thinking{display:flex;gap:4px;padding:3px 0;}
  .geo-thinking span{width:5px;height:5px;background:#00D4B4;border-radius:50%;animation:bounce 1.1s infinite;}
  .geo-thinking span:nth-child(2){animation-delay:.18s;}
  .geo-thinking span:nth-child(3){animation-delay:.36s;}
  .geo-ask-area{padding:10px;border-top:1px solid #1e3d5c;flex-shrink:0;display:flex;gap:6px;}

<script>
/* =========================================================================
   NEBULA-OS  —  a self-contained simulated kernel + window manager
   running entirely in a single HTML file.
   ========================================================================= */

/* ---------------------------- KERNEL LAYER ---------------------------- */
const Kernel = (() => {
  let pidCounter = 1;
  const processes = new Map(); // pid -> {pid,name,cpu,mem,started}
  const listeners = [];

  // ---- Virtual File System (in-memory tree) ----
  const now = () => new Date().toISOString();
  const FS = {
    type:'dir', name:'/', children:{
      home:{type:'dir', name:'home', children:{
        user:{type:'dir', name:'user', children:{
          'readme.txt':{type:'file', name:'readme.txt', content:
`Welcome to NebulaOS!

This is a simulated operating system running entirely inside a single
HTML file: a kernel (process table + virtual filesystem + syscalls),
a window manager, a terminal/shell, and a web browser.

Try the terminal:
  help          show commands
  ls / cd / cat / mkdir / touch / rm / echo
  ps            list kernel processes
  neofetch      system info
  open browser  launch the browser app

Have fun exploring!`},
          'notes.md':{type:'file', name:'notes.md', content:'# Notes\n\n- Build cool stuff\n- Ship it\n'},
          projects:{type:'dir', name:'projects', children:{}}
        }}
      }},
      etc:{type:'dir', name:'etc', children:{
        'os-release':{type:'file', name:'os-release', content:'NAME="NebulaOS"\nVERSION="1.0"\nKERNEL="nebkrnl 6.6.0-sim"\n'}
      }},
      bin:{type:'dir', name:'bin', children:{}},
      tmp:{type:'dir', name:'tmp', children:{}}
    }
  };

  function resolvePath(cwdArr, pathStr){
    let parts;
    if(pathStr.startsWith('/')) parts = pathStr.split('/').filter(Boolean);
    else parts = cwdArr.concat(pathStr.split('/').filter(Boolean));
    const out = [];
    for(const p of parts){
      if(p === '.') continue;
      if(p === '..'){ out.pop(); continue; }
      out.push(p);
    }
    return out;
  }
  function getNode(pathArr){
    let node = FS;
    for(const p of pathArr){
      if(!node.children || !node.children[p]) return null;
      node = node.children[p];
    }
    return node;
  }
  function getParent(pathArr){
    if(pathArr.length===0) return null;
    return getNode(pathArr.slice(0,-1));
  }

  // ---- Process table ----
  function spawn(name, meta={}){
    const pid = pidCounter++;
    const proc = {pid, name, cpu:+(Math.random()*8+0.5).toFixed(1), mem:+(Math.random()*60+10).toFixed(1), started:now(), ...meta};
    processes.set(pid, proc);
    emit();
    return pid;
  }
  function kill(pid){
    const existed = processes.delete(pid);
    emit();
    return existed;
  }
  function list(){ return Array.from(processes.values()); }
  function emit(){ listeners.forEach(fn=>fn(list())); }
  function onChange(fn){ listeners.push(fn); }

  // jiggle cpu/mem periodically for realism
  setInterval(()=>{
    let changed=false;
    processes.forEach(p=>{
      if(p.system) return;
      p.cpu = Math.max(0.1, +(p.cpu + (Math.random()*2-1)).toFixed(1));
      p.mem = Math.max(1, +(p.mem + (Math.random()*4-2)).toFixed(1));
      changed=true;
    });
    if(changed) emit();
  }, 2000);

  // base kernel/system processes
  spawn('nebkrnl', {system:true, cpu:0.4, mem:38.2});
  spawn('windowmanager.svc', {system:true, cpu:1.1, mem:64.5});
  spawn('init', {system:true, cpu:0.1, mem:4.2});

  return { FS, resolvePath, getNode, getParent, spawn, kill, list, onChange, pidNext:()=>pidCounter };
})();

/* ---------------------------- WINDOW MANAGER ---------------------------- */
const WM = (() => {
  const layer = document.getElementById('windowsLayer');
  const taskApps = document.getElementById('taskApps');
  let zTop = 10;
  let openWindows = new Map(); // id -> {el, taskEl, pid, title}
  let winCounter = 0;
  let cascadeX = 60, cascadeY = 40;

  function createWindow({title, icon='🗖', width=560, height=380, x, y, body, onClose, resizable=true, pid}){
    const id = 'win'+(++winCounter);
    const el = document.createElement('div');
    el.className='window';
    el.style.width = width+'px';
    el.style.height = height+'px';
    if(x===undefined){ x = cascadeX; cascadeX += 30; if(cascadeX>window.innerWidth-400) cascadeX=60; }
    if(y===undefined){ y = cascadeY; cascadeY += 30; if(cascadeY>window.innerHeight-400) cascadeY=40; }
    el.style.left = x+'px';
    el.style.top = y+'px';
    el.style.zIndex = ++zTop;

    el.innerHTML = `
      <div class="titlebar">
        <span class="ttitle">${icon} <span class="ttext">${title}</span></span>
        <button class="winbtn min" title="Minimize"></button>
        <button class="winbtn max" title="Maximize"></button>
        <button class="winbtn close" title="Close"></button>
      </div>
      <div class="wbody"></div>
      ${resizable?'<div class="resizer"></div>':''}
    `;
    layer.appendChild(el);
    const wbody = el.querySelector('.wbody');
    if(typeof body === 'function') body(wbody, el); else wbody.appendChild(body);

    // taskbar entry
    const taskEl = document.createElement('div');
    taskEl.className='taskApp active';
    taskEl.innerHTML = `<span>${icon}</span><span>${title}</span>`;
    taskApps.appendChild(taskEl);

    function focus(){
      el.style.zIndex = ++zTop;
      document.querySelectorAll('.taskApp').forEach(t=>t.classList.remove('active'));
      taskEl.classList.add('active');
    }
    el.addEventListener('mousedown', focus);
    taskEl.addEventListener('click', ()=>{
      if(el.style.display==='none'){ el.style.display='flex'; focus(); }
      else { el.style.display='none'; taskEl.classList.remove('active'); }
    });

    // drag
    const titlebar = el.querySelector('.titlebar');
    let drag=null;
    titlebar.addEventListener('mousedown', (e)=>{
      if(e.target.classList.contains('winbtn')) return;
      drag = {sx:e.clientX, sy:e.clientY, ox:el.offsetLeft, oy:el.offsetTop};
      document.addEventListener('mousemove', onDrag);
      document.addEventListener('mouseup', stopDrag);
    });
    function onDrag(e){
      if(!drag) return;
      el.style.left = Math.max(0, drag.ox + (e.clientX-drag.sx)) + 'px';
      el.style.top = Math.max(0, drag.oy + (e.clientY-drag.sy)) + 'px';
    }
    function stopDrag(){ drag=null; document.removeEventListener('mousemove', onDrag); document.removeEventListener('mouseup', stopDrag); }

    // resize
    if(resizable){
      const rez = el.querySelector('.resizer');
      let rs=null;
      rez.addEventListener('mousedown', (e)=>{
        rs = {sx:e.clientX, sy:e.clientY, w:el.offsetWidth, h:el.offsetHeight};
        e.stopPropagation();
        document.addEventListener('mousemove', onResize);
        document.addEventListener('mouseup', stopResize);
      });
      function onResize(e){
        if(!rs) return;
        el.style.width = Math.max(320, rs.w + (e.clientX-rs.sx)) + 'px';
        el.style.height = Math.max(200, rs.h + (e.clientY-rs.sy)) + 'px';
      }
      function stopResize(){ rs=null; document.removeEventListener('mousemove', onResize); document.removeEventListener('mouseup', stopResize); }
    }

    // controls
    let maximized=false, preRect=null;
    el.querySelector('.winbtn.close').addEventListener('click', ()=>{
      el.remove(); taskEl.remove(); openWindows.delete(id);
      if(onClose) onClose();
      if(pid) Kernel.kill(pid);
    });
    el.querySelector('.winbtn.min').addEventListener('click', ()=>{
      el.style.display='none'; taskEl.classList.remove('active');
    });
    el.querySelector('.winbtn.max').addEventListener('click', ()=>{
      if(!maximized){
        preRect = {l:el.style.left, t:el.style.top, w:el.style.width, h:el.style.height};
        el.style.left='0px'; el.style.top='0px';
        el.style.width='100%'; el.style.height='100%';
        maximized=true;
      } else {
        el.style.left=preRect.l; el.style.top=preRect.t; el.style.width=preRect.w; el.style.height=preRect.h;
        maximized=false;
      }
    });

    focus();
    openWindows.set(id, {el, taskEl});
    return {id, el, wbody, focus, close:()=>el.querySelector('.winbtn.close').click()};
  }

  return { createWindow };
})();

/* ---------------------------- APP: TERMINAL ---------------------------- */
function launchTerminal(){
  const pid = Kernel.spawn('bash', {cpu:2.0, mem:18});
  WM.createWindow({title:'Terminal', icon:'⌨', width:620, height:400, pid,
    body:(wbody)=>{
      let cwd = ['home','user'];
      const histArr = []; let histIdx=-1;

      wbody.innerHTML = `<div class="term" id="t-out"></div>
        <div class="term-input-row" style="padding:0 12px 10px 12px;background:#0a0c16;">
          <span class="prompt" id="t-prompt"></span>
          <input id="t-in" autocomplete="off" spellcheck="false"/>
        </div>`;
      const out = wbody.querySelector('#t-out');
      const input = wbody.querySelector('#t-in');
      const promptSpan = wbody.querySelector('#t-prompt');

      function pathStr(){ return '/'+cwd.join('/'); }
      function updatePrompt(){ promptSpan.innerHTML = `user@nebula <span class="path">${pathStr()}</span> $ `; }
      function print(html=''){ const d=document.createElement('div'); d.className='line'; d.innerHTML=html; out.appendChild(d); out.scrollTop=out.scrollHeight; }
      function printText(t=''){ print(escapeHtml(t)); }
      function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

      print(`<span class="hint">NebulaOS shell — type 'help' for commands.</span>`);
      updatePrompt();

      const commands = {
        help(){
          printText(`Available commands:

  Files & navigation:
    ls [path]        list directory contents
    cd <path>         change directory
    pwd                print working directory
    cat <file>         show file contents
    mkdir <dir>        create directory
    touch <file>       create empty file
    write <f> <text>   write/overwrite text to file
    rm <name>          remove file/dir
    mv <src> <dest>    move/rename
    cp <src> <dest>    copy
    find <term>        search filenames
    grep <pat> <file>  search inside a file
    wc <file>          count lines/words/chars
    tree [path]        show directory tree

  System:
    ps / top           list kernel processes
    kill <pid>         kill a process
    free                memory usage
    df                  disk usage
    uptime              time since boot
    env                  environment variables
    uname [-a]          system info
    neofetch             system info banner
    sudo <cmd>           simulate elevated command
    reboot               reload NebulaOS

  Security toolkit:
    pwcheck <pw>        analyze password strength
    genpass [len]       generate a strong random password
    hash <algo> <text>  sha256/sha1/sha512 digest of text
    secscan             scan virtual filesystem for security issues
    firewall <on|off>   toggle simulated firewall
    netstat              show simulated network connections
    lock                 lock the session (requires password to unlock)
    open security        launch full Security Toolkit app

  Misc:
    echo <text>         print text
    whoami / date        
    history              command history
    man <cmd>            manual page (stub)
    open <app>            launch app (browser, files, monitor, about, terminal, security)
    clear / exit`);
        },
        pwd(){ printText(pathStr()); },
        ls(args){
          const target = args[0] ? Kernel.resolvePath(cwd, args[0]) : cwd;
          const node = Kernel.getNode(target);
          if(!node || node.type!=='dir'){ print(`<span class="err">ls: cannot access '${args[0]||''}': not a directory</span>`); return; }
          const items = Object.values(node.children);
          if(items.length===0){ print(`<span class="hint">(empty)</span>`); return; }
          print(items.map(i=> i.type==='dir' ? `<span style="color:#7c5cff">${i.name}/</span>` : i.name).join('   '));
        },
        cd(args){
          if(!args[0]){ cwd=['home','user']; updatePrompt(); return; }
          const target = Kernel.resolvePath(cwd, args[0]);
          const node = Kernel.getNode(target);
          if(!node || node.type!=='dir'){ print(`<span class="err">cd: ${args[0]}: No such directory</span>`); return; }
          cwd = target; updatePrompt();
        },
        cat(args){
          if(!args[0]){ printText('usage: cat <file>'); return; }
          const target = Kernel.resolvePath(cwd, args[0]);
          const node = Kernel.getNode(target);
          if(!node){ print(`<span class="err">cat: ${args[0]}: No such file</span>`); return; }
          if(node.type==='dir'){ print(`<span class="err">cat: ${args[0]}: Is a directory</span>`); return; }
          printText(node.content||'');
        },
        echo(args){ printText(args.join(' ')); },
        mkdir(args){
          if(!args[0]){ printText('usage: mkdir <name>'); return; }
          const target = Kernel.resolvePath(cwd, args[0]);
          const parent = Kernel.getParent(target);
          if(!parent){ print(`<span class="err">mkdir: invalid path</span>`); return; }
          const name = target[target.length-1];
          parent.children[name] = {type:'dir', name, children:{}};
        },
        touch(args){
          if(!args[0]){ printText('usage: touch <name>'); return; }
          const target = Kernel.resolvePath(cwd, args[0]);
          const parent = Kernel.getParent(target);
          if(!parent){ print(`<span class="err">touch: invalid path</span>`); return; }
          const name = target[target.length-1];
          if(!parent.children[name]) parent.children[name] = {type:'file', name, content:''};
        },
        write(args){
          if(args.length<1){ printText('usage: write <file> <text...>'); return; }
          const target = Kernel.resolvePath(cwd, args[0]);
          const parent = Kernel.getParent(target);
          const name = target[target.length-1];
          if(!parent){ print(`<span class="err">write: invalid path</span>`); return; }
          parent.children[name] = {type:'file', name, content:args.slice(1).join(' ')};
          print(`<span class="ok">written.</span>`);
        },
        rm(args){
          if(!args[0]){ printText('usage: rm <name>'); return; }
          const target = Kernel.resolvePath(cwd, args[0]);
          const parent = Kernel.getParent(target);
          const name = target[target.length-1];
          if(!parent || !parent.children[name]){ print(`<span class="err">rm: ${args[0]}: No such file or directory</span>`); return; }
          delete parent.children[name];
        },
        ps(){
          const procs = Kernel.list();
          print(`<span class="hint">PID    NAME                CPU%   MEM(MB)</span>`);
          procs.forEach(p=>{
            printText(`${String(p.pid).padEnd(7)}${p.name.padEnd(20)}${String(p.cpu).padEnd(7)}${p.mem}`);
          });
        },
        kill(args){
          const pid = parseInt(args[0]);
          if(!pid){ printText('usage: kill <pid>'); return; }
          const ok = Kernel.kill(pid);
          print(ok? `<span class="ok">Process ${pid} terminated.</span>` : `<span class="err">kill: (${pid}) - No such process</span>`);
        },
        neofetch(){
          print(`<span style="color:#7c5cff">⟡ NebulaOS</span> <span class="hint">v1.0 "Aurora"</span>
<span class="hint">-----------------------</span>
<b>Kernel:</b>   nebkrnl 6.6.0-sim
<b>Uptime:</b>   ${Math.floor(performance.now()/1000)}s
<b>Shell:</b>    nebbash 5.2
<b>Procs:</b>    ${Kernel.list().length}
<b>Host:</b>     browser-vm
<b>Display:</b>  ${window.innerWidth}x${window.innerHeight}`);
        },
        clear(){ out.innerHTML=''; },
        whoami(){ printText('user'); },
        date(){ printText(new Date().toString()); },
        uname(args){
          if(args[0]==='-a') printText('NebulaOS nebkrnl 6.6.0-sim x86_64 GNU/Nebula');
          else printText('NebulaOS nebkrnl 6.6.0-sim x86_64 (simulated)');
        },
        history(){ histArr.forEach((h,i)=> printText(`${i+1}  ${h}`)); },
        mv(args){
          if(args.length<2){ printText('usage: mv <src> <dest>'); return; }
          const srcPath = Kernel.resolvePath(cwd, args[0]);
          const srcParent = Kernel.getParent(srcPath);
          const srcName = srcPath[srcPath.length-1];
          if(!srcParent || !srcParent.children[srcName]){ print(`<span class="err">mv: cannot stat '${args[0]}'</span>`); return; }
          const node = srcParent.children[srcName];
          const destPath = Kernel.resolvePath(cwd, args[1]);
          const destNode = Kernel.getNode(destPath);
          let destParent, destName;
          if(destNode && destNode.type==='dir'){ destParent = destNode; destName = srcName; }
          else { destParent = Kernel.getParent(destPath); destName = destPath[destPath.length-1]; }
          if(!destParent){ print(`<span class="err">mv: invalid destination</span>`); return; }
          node.name = destName;
          destParent.children[destName] = node;
          delete srcParent.children[srcName];
        },
        cp(args){
          if(args.length<2){ printText('usage: cp <src> <dest>'); return; }
          const srcPath = Kernel.resolvePath(cwd, args[0]);
          const node = Kernel.getNode(srcPath);
          if(!node){ print(`<span class="err">cp: cannot stat '${args[0]}'</span>`); return; }
          const copy = JSON.parse(JSON.stringify(node));
          const destPath = Kernel.resolvePath(cwd, args[1]);
          const destNode = Kernel.getNode(destPath);
          let destParent, destName;
          if(destNode && destNode.type==='dir'){ destParent = destNode; destName = copy.name; }
          else { destParent = Kernel.getParent(destPath); destName = destPath[destPath.length-1]; copy.name = destName; }
          if(!destParent){ print(`<span class="err">cp: invalid destination</span>`); return; }
          destParent.children[destName] = copy;
        },
        find(args){
          const term = args[0]||'';
          const results=[];
          function walk(node, path){
            Object.values(node.children||{}).forEach(c=>{
              const p = path+'/'+c.name;
              if(c.name.includes(term)) results.push(p);
              if(c.type==='dir') walk(c, p);
            });
          }
          walk(Kernel.FS, '');
          if(results.length===0) printText('No matches.'); else results.forEach(r=>printText(r));
        },
        grep(args){
          if(args.length<2){ printText('usage: grep <pattern> <file>'); return; }
          const target = Kernel.resolvePath(cwd, args[1]);
          const node = Kernel.getNode(target);
          if(!node || node.type!=='file'){ print(`<span class="err">grep: ${args[1]}: No such file</span>`); return; }
          const lines = (node.content||'').split('\n').filter(l=>l.includes(args[0]));
          if(lines.length===0) printText('(no matches)'); else lines.forEach(l=>printText(l));
        },
        wc(args){
          if(!args[0]){ printText('usage: wc <file>'); return; }
          const target = Kernel.resolvePath(cwd, args[0]);
          const node = Kernel.getNode(target);
          if(!node || node.type!=='file'){ print(`<span class="err">wc: ${args[0]}: No such file</span>`); return; }
          const c = node.content||'';
          printText(`${c.split('\n').length} lines  ${c.split(/\s+/).filter(Boolean).length} words  ${c.length} chars`);
        },
        tree(args){
          const startPath = args[0] ? Kernel.resolvePath(cwd, args[0]) : cwd;
          const startNode = Kernel.getNode(startPath);
          if(!startNode || startNode.type!=='dir'){ print(`<span class="err">tree: not a directory</span>`); return; }
          const lines=[];
          function walk(node, prefix){
            const items = Object.values(node.children||{});
            items.forEach((c,i)=>{
              const last = i===items.length-1;
              lines.push(prefix + (last?'└── ':'├── ') + c.name + (c.type==='dir'?'/':''));
              if(c.type==='dir') walk(c, prefix + (last?'    ':'│   '));
            });
          }
          printText('.');
          walk(startNode, '');
          lines.forEach(l=>printText(l));
        },
        env(){ printText('USER=user\nHOME=/home/user\nSHELL=/bin/nebbash\nOS=NebulaOS\nTERM=neb-256color'); },
        df(){ printText('Filesystem      Size  Used  Avail  Use%\nnebula-vfs      1.0G  4.2M  996M    1%'); },
        free(){
          const totalMem = Kernel.list().reduce((a,p)=>a+p.mem,0);
          printText(`              total      used      free\nMem(MB)       8192      ${Math.round(totalMem)}      ${8192-Math.round(totalMem)}`);
        },
        top(){ commands.ps(); },
        uptime(){ printText(`up ${Math.floor(performance.now()/1000)} seconds, 1 user`); },
        man(args){
          if(!args[0]){ printText('What manual page do you want?'); return; }
          printText(`${args[0]}(1)  —  NebulaOS manual\n\nNo full manual installed in this simulation. Try 'help' for a quick summary of available commands.`);
        },
        sudo(args){ printText(`[sudo] this is a simulation — running '${args.join(' ')}' as user anyway.`); const c2=args[0]; if(c2 && commands[c2]) commands[c2](args.slice(1)); },
        reboot(){ print('<span class="hint">Rebooting NebulaOS...</span>'); setTimeout(()=>location.reload(), 700); },
        exit(){ print('<span class="hint">Closing terminal...</span>'); setTimeout(()=> wbody.closest('.window')?.querySelector('.winbtn.close')?.click(), 300); },
        open(args){
          const app = (args[0]||'').toLowerCase();
          const map = {browser:launchBrowser, files:launchFiles, monitor:launchMonitor, about:launchAbout, terminal:launchTerminal, settings:launchMonitor, security:launchSecurity};
          if(map[app]){ map[app](); print(`<span class="ok">Launching ${app}...</span>`); }
          else printText(`open: unknown app '${args[0]||''}'. Try: browser, files, monitor, about, security`);
        },
        pwcheck(args){
          if(!args[0]){ printText('usage: pwcheck <password>'); return; }
          const r = analyzePassword(args.join(' '));
          print(`<span class="hint">Score:</span> ${r.label} <span class="hint">(${r.score}/4)</span>
Entropy: ~${r.entropy} bits   Est. crack time (offline, fast hw): ${r.crackTime}
${r.feedback.map(f=>'- '+f).join('\n')}`);
        },
        genpass(args){
          const len = Math.max(8, Math.min(64, parseInt(args[0])||16));
          const pw = generatePassword(len);
          print(`<span class="ok">${pw}</span>`);
        },
        hash(args){
          if(args.length<1){ printText('usage: hash <sha256|sha1|sha512> <text...>'); return; }
          let algo = args[0].toLowerCase(); let text;
          const algMap = {sha256:'SHA-256', sha1:'SHA-1', sha512:'SHA-512'};
          if(algMap[algo]){ text = args.slice(1).join(' '); }
          else { algo='sha256'; text = args.join(' '); }
          if(!text){ printText('usage: hash <sha256|sha1|sha512> <text...>'); return; }
          crypto.subtle.digest(algMap[algo], new TextEncoder().encode(text)).then(buf=>{
            const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
            print(`<span class="hint">${algMap[algo]}:</span> ${hex}`);
          });
        },
        secscan(){
          print('<span class="hint">Running NebulaShield filesystem audit...</span>');
          setTimeout(()=>{
            const findings = scanFilesystem(Kernel.FS, '');
            if(findings.length===0){
              print('<span class="ok">✓ No issues found. Filesystem looks clean.</span>');
            } else {
              print(`<span class="err">Found ${findings.length} issue(s):</span>`);
              findings.forEach(f=> print(`  <span class="err">⚠</span> ${f}`));
            }
            print('<span class="hint">Tip: avoid storing plaintext secrets/passwords in files. Use generated passwords (genpass) and never reuse them.</span>');
          }, 500);
        },
        clamscan(){ commands.secscan(); },
        firewall(args){
          const sub = (args[0]||'status').toLowerCase();
          if(sub==='on'){ window.__nebFirewall=true; print('<span class="ok">Firewall ENABLED (simulated).</span>'); }
          else if(sub==='off'){ window.__nebFirewall=false; print('<span class="err">Firewall DISABLED (simulated).</span>'); }
          else printText(`Firewall is currently ${window.__nebFirewall===false?'OFF':'ON'} (simulated).`);
        },
        netstat(){
          print(`<span class="hint">Proto  Local Address        State        Process</span>`);
          [['tcp','127.0.0.1:443','ESTABLISHED','nebula-browser'],
           ['tcp','127.0.0.1:22','LISTEN','sshd-sim'],
           ['udp','0.0.0.0:68','LISTEN','dhclient-sim']].forEach(r=>{
            printText(`${r[0].padEnd(7)}${r[1].padEnd(21)}${r[2].padEnd(13)}${r[3]}`);
          });
        },
        lock(){ print('<span class="hint">Locking session...</span>'); setTimeout(()=>Auth.lock(), 200); }
      };

      input.addEventListener('keydown', (e)=>{
        if(e.key==='Enter'){
          const raw = input.value;
          print(`<span class="prompt">user@nebula</span> <span class="path">${pathStr()}</span> $ ${escapeHtml(raw)}`);
          if(raw.trim()){ histArr.push(raw); histIdx = histArr.length; }
          const parts = raw.trim().split(/\s+/).filter(Boolean);
          const cmd = parts[0];
          const args = parts.slice(1);
          if(cmd){
            if(commands[cmd]) commands[cmd](args);
            else print(`<span class="err">command not found: ${escapeHtml(cmd)}</span> <span class="hint">(try 'help')</span>`);
          }
          input.value='';
        } else if(e.key==='ArrowUp'){
          if(histIdx>0){ histIdx--; input.value = histArr[histIdx]; }
          e.preventDefault();
        } else if(e.key==='ArrowDown'){
          if(histIdx < histArr.length-1){ histIdx++; input.value = histArr[histIdx]; }
          else { histIdx = histArr.length; input.value=''; }
          e.preventDefault();
        }
      });
      setTimeout(()=>input.focus(), 50);
      wbody.addEventListener('mousedown', (e)=>{ if(e.target.tagName!=='INPUT') input.focus(); });
    }
  });
}

/* ---------------------------- APP: BROWSER ---------------------------- */
function launchBrowser(startUrl){
  const pid = Kernel.spawn('nebula-browser', {cpu:6, mem:140});
  WM.createWindow({title:'Browser', icon:'🌐', width:780, height:520, pid,
    body:(wbody)=>{
      wbody.innerHTML = `
        <div class="browser-bar">
          <button id="b-back">←</button>
          <button id="b-fwd">→</button>
          <button id="b-reload">⟳</button>
          <button id="b-home">⌂</button>
          <input id="b-url" placeholder="Search or enter address" />
          <button id="b-go">Go</button>
        </div>
        <div id="b-content" style="flex:1;position:relative;display:flex;"></div>
      `;
      const content = wbody.querySelector('#b-content');
      const urlInput = wbody.querySelector('#b-url');
      let history=[], hidx=-1;

      function homeView(){
        content.innerHTML = `<div class="browser-home">
            <h1>⟡ NebulaSearch</h1>
            <div class="searchbox">
              <input id="home-q" placeholder="Search the web or type a URL"/>
              <button id="home-go">Go</button>
            </div>
            <div class="quicklinks">
              <div class="qlink" data-u="https://www.wikipedia.org">Wikipedia</div>
              <div class="qlink" data-u="https://www.google.com">Google</div>
              <div class="qlink" data-u="https://news.ycombinator.com">Hacker News</div>
              <div class="qlink" data-u="https://github.com">GitHub</div>
              <div class="qlink" data-u="https://www.anthropic.com">Anthropic</div>
            </div>
            <div class="browser-note">Note: some sites block embedding in frames (X-Frame-Options); if a page won't load, NebulaOS will show a notice with a link to open it in a real new tab.</div>
          </div>`;
        const q = content.querySelector('#home-q');
        content.querySelector('#home-go').onclick = ()=> go(q.value);
        q.addEventListener('keydown', e=>{ if(e.key==='Enter') go(q.value); });
        content.querySelectorAll('.qlink').forEach(el=> el.addEventListener('click', ()=> go(el.dataset.u)));
        urlInput.value='';
      }

      function normalize(u){
        u = u.trim();
        if(!u) return null;
        if(/^https?:\/\//i.test(u)) return u;
        if(/^[\w-]+\.[a-z]{2,}([/?].*)?$/i.test(u) && !u.includes(' ')) return 'https://'+u;
        return 'https://www.google.com/search?q='+encodeURIComponent(u)+'&igu=1';
      }

      function loadFrame(url){
        content.innerHTML = '';
        const iframe = document.createElement('iframe');
        iframe.className='browser-frame';
        iframe.src = url;
        let loaded=false;
        iframe.onload = ()=>{ loaded=true; };
        content.appendChild(iframe);
        // detect blocked frames after a delay (best-effort, can't always detect due to cross-origin)
        setTimeout(()=>{
          try{
            // if same-origin and blank, show fallback - best effort only
          }catch(e){}
        }, 1200);
        const fallback = document.createElement('div');
        fallback.style.cssText='position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:#11132a;color:#e9e9f5;gap:10px;text-align:center;padding:20px;';
        fallback.innerHTML = `<div style="font-size:40px;">🚫</div><div>This site refused to load inside NebulaOS's embedded browser.</div>
          <a href="${url}" target="_blank" style="color:#00d9c0;">Open ${url} in a new real tab ↗</a>`;
        content.style.position='relative';
        content.appendChild(fallback);
        iframe.addEventListener('error', ()=>{ fallback.style.display='flex'; iframe.style.display='none'; });
      }

      function go(raw){
        const url = normalize(raw);
        if(!url) { homeView(); return; }
        history = history.slice(0,hidx+1); history.push(url); hidx = history.length-1;
        urlInput.value = url.startsWith('https://www.google.com/search')? raw : url;
        loadFrame(url);
      }
      wbody.go = go;

      wbody.querySelector('#b-go').onclick = ()=> go(urlInput.value);
      urlInput.addEventListener('keydown', e=>{ if(e.key==='Enter') go(urlInput.value); });
      wbody.querySelector('#b-home').onclick = ()=>{ hidx=-1; history=[]; homeView(); };
      wbody.querySelector('#b-back').onclick = ()=>{ if(hidx>0){ hidx--; loadFrame(history[hidx]); urlInput.value=history[hidx]; } else { hidx=-1; homeView(); } };
      wbody.querySelector('#b-fwd').onclick = ()=>{ if(hidx<history.length-1){ hidx++; loadFrame(history[hidx]); urlInput.value=history[hidx]; } };
      wbody.querySelector('#b-reload').onclick = ()=>{ if(history[hidx]) loadFrame(history[hidx]); };

      if(startUrl) go(startUrl); else homeView();
    }
  });
}

/* ---------------------------- APP: FILE MANAGER ---------------------------- */
function launchFiles(){
  const pid = Kernel.spawn('nebula-files', {cpu:1.2, mem:30});
  WM.createWindow({title:'Files', icon:'📁', width:560, height:420, pid,
    body:(wbody)=>{
      let cwd = [];
      wbody.innerHTML = `<div class="fm"><div class="fm-path" id="fm-path"></div><div class="fm-grid" id="fm-grid"></div></div>`;
      const grid = wbody.querySelector('#fm-grid');
      const pathEl = wbody.querySelector('#fm-path');
      function render(){
        pathEl.textContent = '/'+cwd.join('/');
        const node = Kernel.getNode(cwd) || Kernel.FS;
        grid.innerHTML='';
        if(cwd.length>0){
          const up = document.createElement('div');
          up.className='fm-item'; up.innerHTML=`<div class="fg">⬆️</div><div class="fl">..</div>`;
          up.onclick=()=>{ cwd=cwd.slice(0,-1); render(); };
          grid.appendChild(up);
        }
        Object.values(node.children).forEach(item=>{
          const el = document.createElement('div');
          el.className='fm-item';
          el.innerHTML = `<div class="fg">${item.type==='dir'?'📁':'📄'}</div><div class="fl">${item.name}</div>`;
          el.ondblclick = ()=>{
            if(item.type==='dir'){ cwd = cwd.concat(item.name); render(); }
            else {
              WM.createWindow({title:item.name, icon:'📄', width:480, height:380, body:(b)=>{
                b.innerHTML = `<textarea style="flex:1;border:none;outline:none;background:#0d0f1f;color:#e9e9f5;padding:14px;font-family:Consolas,monospace;font-size:13px;resize:none;">${item.content.replace(/</g,'&lt;')}</textarea>`;
                const ta = b.querySelector('textarea');
                ta.addEventListener('input', ()=> item.content = ta.value);
              }});
            }
          };
          grid.appendChild(el);
        });
      }
      render();
    }
  });
}

/* ---------------------------- SECURITY HELPERS ---------------------------- */
const COMMON_PASSWORDS = ['123456','password','123456789','12345678','12345','qwerty','abc123','111111',
  '1234567','password1','iloveyou','admin','letme in','welcome','monkey','dragon','football','login','master','sunshine'];

function analyzePassword(pw){
  const feedback = [];
  let score = 0;
  const len = pw.length;
  const lower = pw.toLowerCase();

  const hasLower = /[a-z]/.test(pw);
  const hasUpper = /[A-Z]/.test(pw);
  const hasDigit = /[0-9]/.test(pw);
  const hasSymbol = /[^a-zA-Z0-9]/.test(pw);
  const variety = [hasLower,hasUpper,hasDigit,hasSymbol].filter(Boolean).length;

  let pool = 0;
  if(hasLower) pool += 26;
  if(hasUpper) pool += 26;
  if(hasDigit) pool += 10;
  if(hasSymbol) pool += 32;
  const entropy = pool>0 ? Math.round(len * Math.log2(pool)) : 0;

  const isCommon = COMMON_PASSWORDS.includes(lower);
  const isSequential = /^(?:0123|1234|2345|3456|4567|5678|6789|abcd|qwer|asdf)/i.test(pw);
  const isRepeated = /^(.)\1+$/.test(pw);

  if(len < 8) feedback.push('Too short — use at least 12 characters.');
  else if(len < 12) feedback.push('Consider using 12+ characters for better security.');
  else feedback.push('Good length.');

  if(variety < 3) feedback.push('Mix uppercase, lowercase, numbers, and symbols.');
  else feedback.push('Good character variety.');

  if(isCommon) feedback.push('This is one of the most commonly leaked passwords — never use it.');
  if(isSequential) feedback.push('Avoid sequential patterns (1234, abcd, qwer...).');
  if(isRepeated) feedback.push('Avoid repeated single characters.');
  if(/^[a-zA-Z]+$/.test(pw) && len<16) feedback.push('All-letters passwords are weaker — add numbers/symbols.');

  if(isCommon || isSequential || isRepeated) score = 0;
  else {
    score = 1;
    if(len>=12) score++;
    if(variety>=3) score++;
    if(len>=16 && variety>=4) score++;
    score = Math.min(score,4);
  }

  const labels = ['Very Weak','Weak','Fair','Strong','Very Strong'];
  const label = labels[score];

  // rough offline fast-hardware guess rate ~10^10 guesses/sec for naive hash
  const guesses = Math.pow(2, entropy);
  const seconds = guesses / 1e10;
  const crackTime = humanizeSeconds(isCommon ? 0.0001 : seconds);

  return {score, label, entropy, crackTime, feedback};
}

function humanizeSeconds(s){
  if(s < 1) return 'instantly';
  const units = [[60,'seconds'],[60,'minutes'],[24,'hours'],[365,'days'],[100,'years'],[Infinity,'centuries']];
  let val = s, unitName='seconds';
  for(const [div,name] of units){
    if(val < div){ unitName = name; break; }
    val /= div; unitName = name;
  }
  return `~${val<1?val.toFixed(2):Math.round(val)} ${unitName}`;
}

function generatePassword(len=16){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%^&*()-_=+';
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr, n => chars[n % chars.length]).join('');
}

// Naive simulated audit of the virtual filesystem — looks for plaintext-secret
// patterns in file contents, purely for in-browser educational demonstration.
function scanFilesystem(node, path){
  const findings = [];
  const secretPattern = /(password|passwd|secret|api[_-]?key|token)\s*[:=]\s*\S+/i;
  Object.values(node.children||{}).forEach(c=>{
    const p = path + '/' + c.name;
    if(c.type==='file'){
      if(secretPattern.test(c.content||'')){
        findings.push(`${p} — possible plaintext credential found in file contents.`);
      }
      if(c.content && COMMON_PASSWORDS.some(pw=>c.content.toLowerCase().includes(pw))){
        findings.push(`${p} — contains a known weak/common password string.`);
      }
    } else if(c.type==='dir'){
      findings.push(...scanFilesystem(c, p));
    }
  });
  return findings;
}

        geoCtx.strokeStyle='rgba(30,61,92,0.6)'; geoCtx.lineWidth=0.5;

        for(let x=0;x<W;x+=G*5)for(let y=0;y<H;y+=G*5){geoCtx.beginPath();geoCtx.arc(x,y,2,0,Math.PI*2);geoCtx.fill();}

      function geoDrawHandle(x,y){
        geoCtx.save(); geoCtx.shadowBlur=0;
        geoCtx.fillStyle='#0D1B2A'; geoCtx.strokeStyle='#00D4B4'; geoCtx.lineWidth=1.5;
        geoCtx.beginPath(); geoCtx.arc(x,y,5,0,Math.PI*2); geoCtx.fill(); geoCtx.stroke();
        geoCtx.restore();
      }

      function geoShapeStyle(s, sel){
        geoCtx.strokeStyle = s.color||'#00D4B4';
        geoCtx.lineWidth = (s.sw||2)+(sel?1:0);
        geoCtx.lineCap='round'; geoCtx.lineJoin='round';
        geoCtx.shadowBlur = sel ? 8 : 0;
        geoCtx.shadowColor = s.color||'#00D4B4';
      }

      function geoDrawShape(s, sel=false){
        geoCtx.save(); geoShapeStyle(s,sel); geoCtx.fillStyle='transparent';
        const G=GEO_GRID;
        if(s.type==='line'){
          geoCtx.beginPath(); geoCtx.moveTo(s.x1,s.y1); geoCtx.lineTo(s.x2,s.y2); geoCtx.stroke();
          if(sel){geoDrawHandle(s.x1,s.y1); geoDrawHandle(s.x2,s.y2);}
        } else if(s.type==='rect'){
          const w=s.x2-s.x1, h=s.y2-s.y1;
          geoCtx.strokeRect(s.x1,s.y1,w,h);
          if(sel){geoCtx.fillStyle='rgba(0,212,180,0.06)';geoCtx.fillRect(s.x1,s.y1,w,h);}
        } else if(s.type==='circle'){
          geoCtx.beginPath(); geoCtx.arc(s.cx,s.cy,s.r,0,Math.PI*2); geoCtx.stroke();
          if(sel){geoCtx.fillStyle='rgba(0,212,180,0.05)';geoCtx.fill();geoDrawHandle(s.cx,s.cy);geoDrawHandle(s.cx+s.r,s.cy);}
        } else if(s.type==='triangle'||s.type==='polygon'){
          geoCtx.beginPath(); geoCtx.moveTo(s.pts[0].x,s.pts[0].y);
          s.pts.slice(1).forEach(p=>geoCtx.lineTo(p.x,p.y)); geoCtx.closePath(); geoCtx.stroke();
          if(sel){geoCtx.fillStyle='rgba(0,212,180,0.05)';geoCtx.fill();s.pts.forEach(p=>geoDrawHandle(p.x,p.y));}
        } else if(s.type==='measure'){
          const dx=s.x2-s.x1, dy=s.y2-s.y1, dist=Math.sqrt(dx*dx+dy*dy);
          geoCtx.strokeStyle='#FFB347'; geoCtx.lineWidth=1.5; geoCtx.setLineDash([6,4]);
          geoCtx.beginPath(); geoCtx.moveTo(s.x1,s.y1); geoCtx.lineTo(s.x2,s.y2); geoCtx.stroke(); geoCtx.setLineDash([]);
          const ang=Math.atan2(dy,dx);
          [[s.x1,s.y1],[s.x2,s.y2]].forEach(([tx,ty])=>{
            geoCtx.beginPath();geoCtx.moveTo(tx+Math.cos(ang+Math.PI/2)*6,ty+Math.sin(ang+Math.PI/2)*6);
            geoCtx.lineTo(tx+Math.cos(ang-Math.PI/2)*6,ty+Math.sin(ang-Math.PI/2)*6);geoCtx.stroke();
          });
          const mx2=(s.x1+s.x2)/2, my2=(s.y1+s.y2)/2;
          geoCtx.fillStyle='#FFB347'; geoCtx.font='600 11px Space Grotesk,sans-serif'; geoCtx.textAlign='center';
          geoCtx.fillText((dist/G).toFixed(2)+' u', mx2, my2-8);
        } else if(s.type==='angle' && s.pts && s.pts.length===3){
          const [v,a1,a2]=s.pts;
          geoCtx.strokeStyle='#a78bfa'; geoCtx.lineWidth=1.5; geoCtx.setLineDash([5,3]);
          geoCtx.beginPath();geoCtx.moveTo(v.x,v.y);geoCtx.lineTo(a1.x,a1.y);geoCtx.stroke();
          geoCtx.beginPath();geoCtx.moveTo(v.x,v.y);geoCtx.lineTo(a2.x,a2.y);geoCtx.stroke();
          geoCtx.setLineDash([]);
          const ang1=Math.atan2(a1.y-v.y,a1.x-v.x), ang2=Math.atan2(a2.y-v.y,a2.x-v.x);
          geoCtx.beginPath(); geoCtx.arc(v.x,v.y,28,ang1,ang2); geoCtx.stroke();
          const deg=geoAngleBetween(v,a1,a2).toFixed(1);
          const midA=(ang1+ang2)/2;
          geoCtx.fillStyle='#a78bfa'; geoCtx.font='600 11px Space Grotesk,sans-serif'; geoCtx.textAlign='center'; geoCtx.setLineDash([]);
          geoCtx.fillText(deg+'°', v.x+Math.cos(midA)*46, v.y+Math.sin(midA)*46);
        } else if(s.type==='text'){
          geoCtx.fillStyle=s.color||'#F0F4F8'; geoCtx.font='500 13px Space Grotesk,sans-serif'; geoCtx.textAlign='left';
          geoCtx.fillText(s.text, s.x, s.y);
        }
        geoCtx.restore();
      }

      function geoRedraw(){
        geoCtx.clearRect(0,0,geoCanvas.width,geoCanvas.height);
        geoDrawGrid();
        geo.shapes.forEach(s=>geoDrawShape(s, s===geo.selected));
        if(geo.drawing) geoDrawPreview();
      }

      function geoDrawPreview(){
        const G=GEO_GRID;
        geoCtx.save(); geoCtx.strokeStyle=geo.color; geoCtx.lineWidth=geo.strokeWidth;
        geoCtx.setLineDash([5,4]); geoCtx.globalAlpha=0.7;
        if(geo.tool==='line'){geoCtx.beginPath();geoCtx.moveTo(geo.sx,geo.sy);geoCtx.lineTo(geo.mx,geo.my);geoCtx.stroke();}
        else if(geo.tool==='rect'){geoCtx.strokeRect(geo.sx,geo.sy,geo.mx-geo.sx,geo.my-geo.sy);}
        else if(geo.tool==='circle'){const r=Math.hypot(geo.mx-geo.sx,geo.my-geo.sy);geoCtx.beginPath();geoCtx.arc(geo.sx,geo.sy,r,0,Math.PI*2);geoCtx.stroke();}
        else if(geo.tool==='triangle'){const mx2=(geo.sx+geo.mx)/2;geoCtx.beginPath();geoCtx.moveTo(mx2,geo.sy);geoCtx.lineTo(geo.mx,geo.my);geoCtx.lineTo(geo.sx,geo.my);geoCtx.closePath();geoCtx.stroke();}
        else if(geo.tool==='polygon'){const n=+wbody.querySelector('#geoPolyN').value||6;const r=Math.hypot(geo.mx-geo.sx,geo.my-geo.sy);geoCtx.beginPath();for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2-Math.PI/2;i===0?geoCtx.moveTo(geo.sx+r*Math.cos(a),geo.sy+r*Math.sin(a)):geoCtx.lineTo(geo.sx+r*Math.cos(a),geo.sy+r*Math.sin(a));}geoCtx.closePath();geoCtx.stroke();}
        else if(geo.tool==='measure'){geoCtx.strokeStyle='#FFB347';geoCtx.beginPath();geoCtx.moveTo(geo.sx,geo.sy);geoCtx.lineTo(geo.mx,geo.my);geoCtx.stroke();}
        geoCtx.restore();
      }

      // ── MATH HELPERS ───
      function geoAngleBetween(v,a1,a2){
        const dx1=a1.x-v.x,dy1=a1.y-v.y, dx2=a2.x-v.x,dy2=a2.y-v.y;
        const dot=dx1*dx2+dy1*dy2, mag=Math.hypot(dx1,dy1)*Math.hypot(dx2,dy2);
        return mag>0 ? Math.acos(Math.min(1,Math.max(-1,dot/mag)))*180/Math.PI : 0;
      }
      function geoPolyArea(pts){let a=0;for(let i=0,j=pts.length-1;i<pts.length;j=i++)a+=(pts[j].x+pts[i].x)*(pts[j].y-pts[i].y);return Math.abs(a/2);}
      function geoPolyPerimeter(pts){let p=0;for(let i=0,j=pts.length-1;i<pts.length;j=i++)p+=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);return p;}

      function geoGetMeasurements(s){
        const u=1/GEO_GRID;
        if(s.type==='line'){const d=Math.hypot(s.x2-s.x1,s.y2-s.y1)*u;const a=Math.atan2(s.y2-s.y1,s.x2-s.x1)*180/Math.PI;return[['Length',d.toFixed(3)+' u'],['Angle',a.toFixed(1)+'°']];}
        if(s.type==='rect'){const w=Math.abs(s.x2-s.x1)*u,h=Math.abs(s.y2-s.y1)*u;return[['Width',w.toFixed(3)+' u'],['Height',h.toFixed(3)+' u'],['Area',(w*h).toFixed(3)+' u²'],['Perimeter',(2*(w+h)).toFixed(3)+' u'],['Diagonal',Math.hypot(w,h).toFixed(3)+' u']];}
        if(s.type==='circle'){const r=s.r*u;return[['Radius',r.toFixed(3)+' u'],['Diameter',(2*r).toFixed(3)+' u'],['Circumference',(2*Math.PI*r).toFixed(3)+' u'],['Area',(Math.PI*r*r).toFixed(3)+' u²']];}
        if(s.type==='triangle'){const pts=s.pts,area=geoPolyArea(pts)*u*u,per=geoPolyPerimeter(pts)*u,sides=pts.map((_,i)=>Math.hypot(pts[(i+1)%3].x-pts[i].x,pts[(i+1)%3].y-pts[i].y)*u),angles=pts.map((_,i)=>geoAngleBetween(pts[i],pts[(i+1)%3],pts[(i+2)%3]));return[['Side a',sides[0].toFixed(2)+' u'],['Side b',sides[1].toFixed(2)+' u'],['Side c',sides[2].toFixed(2)+' u'],['Angle A',angles[0].toFixed(1)+'°'],['Angle B',angles[1].toFixed(1)+'°'],['Angle C',angles[2].toFixed(1)+'°'],['Area',area.toFixed(3)+' u²'],['Perimeter',per.toFixed(3)+' u']];}
        if(s.type==='polygon'){return[['Sides',s.sides||s.pts.length],['Area',geoPolyArea(s.pts)*u*u.toFixed(3)+' u²'],['Perimeter',(geoPolyPerimeter(s.pts)*u).toFixed(3)+' u']];}
        if(s.type==='measure'){return[['Distance',(Math.hypot(s.x2-s.x1,s.y2-s.y1)/GEO_GRID).toFixed(3)+' u']];}
        if(s.type==='angle'&&s.pts&&s.pts.length===3){const deg=geoAngleBetween(s.pts[0],s.pts[1],s.pts[2]);return[['Angle',deg.toFixed(2)+'°'],['Supplement',(180-deg).toFixed(2)+'°']];}
        return [];
      }

      const GEO_ICONS={line:'╱',rect:'▭',circle:'○',triangle:'△',polygon:'⬡',measure:'⌇',angle:'∠',text:'T'};
      const GEO_NAMES={line:'Line',rect:'Rectangle',circle:'Circle',triangle:'Triangle',polygon:'Polygon',measure:'Measurement',angle:'Angle',text:'Label'};

      function geoUpdateShapes(){
        const list=wbody.querySelector('#geoShapesList');
        const empty=wbody.querySelector('#geoShapesEmpty');
        list.innerHTML='';
        empty.style.display=geo.shapes.length?'none':'block';
        geo.shapes.forEach((s,i)=>{
          const div=document.createElement('div');
          div.className='geo-shape-item'+(s===geo.selected?' sel':'');
          div.innerHTML=`<span style="color:${s.color||'#00D4B4'}">${GEO_ICONS[s.type]||'◻'}</span>
            <span style="flex:1;font-size:11.5px;font-weight:600;">${GEO_NAMES[s.type]||s.type} <span style="color:#7a9bb5;font-weight:400">#${i+1}</span></span>
            <button class="geo-shape-del" onclick="event.stopPropagation();geoDeleteShape(${i})">✕</button>`;
          div.onclick=()=>{geo.selected=s;geoUpdateShapes();geoUpdateMeasures();geoRedraw();};
          list.appendChild(div);
        });
      }
      function geoUpdateMeasures(){
        const el=wbody.querySelector('#geoMeasuresList');
        const empty=wbody.querySelector('#geoMeasuresEmpty');
        if(!geo.selected){el.innerHTML='';empty.style.display='block';return;}
        const m=geoGetMeasurements(geo.selected);
        empty.style.display=m.length?'none':'block';
        el.innerHTML=`<div style="font-size:10.5px;font-weight:700;color:#7a9bb5;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;">${GEO_NAMES[geo.selected.type]||geo.selected.type} — Properties</div>`
          +m.map(([k,v])=>`<div class="geo-measure-row"><span class="geo-mkey">${k}</span><span class="geo-mval">${v}</span></div>`).join('');
      }

      // expose globals for onclick handlers
      window.geoSetTool = function(t){
        geo.tool=t; geo.anglePoints=[];
        wbody.querySelectorAll('.geo-tool-btn').forEach(b=>b.classList.remove('active'));
        const btn=wbody.querySelector('#geoTool-'+t); if(btn) btn.classList.add('active');
        geoCanvas.style.cursor=t==='select'?'default':'crosshair';
        const msgs={select:'Click to select, drag to move',line:'Drag to draw a line',rect:'Drag to draw a rectangle',circle:'Click center, drag for radius',triangle:'Drag to draw a triangle',polygon:'Drag to set polygon size',measure:'Drag to measure distance',angle:'Click 3 points: vertex → arm1 → arm2',text:'Click to place a label'};
        wbody.querySelector('#geoStatus').textContent = msgs[t]||'';
      };
      window.geoSetColor = function(c,el){
        geo.color=c;
        wbody.querySelectorAll('.geo-swatch').forEach(s=>s.classList.remove('sel'));
        el.classList.add('sel');
      };
      window.geoClearAll = function(){
        if(!geo.shapes.length) return;
        if(!confirm('Clear all shapes?')) return;
        geo.shapes=[]; geo.selected=null; geoUpdateShapes(); geoUpdateMeasures(); geoRedraw();
      };
      window.geoDeleteShape = function(i){
        if(geo.shapes[i]===geo.selected) geo.selected=null;
        geo.shapes.splice(i,1); geoUpdateShapes(); geoUpdateMeasures(); geoRedraw();
      };
      window.geoSwitchTab = function(t){
        ['shapes','measure','hints'].forEach(x=>{
          wbody.querySelector('#geotab-'+x).classList.toggle('active',x===t);
          wbody.querySelector('#geopanel-'+x).style.display=x===t?'':'none';
        });
        const askArea=wbody.querySelector('#geoAskArea');
        if(askArea) askArea.style.display=t==='hints'?'':'none';
        if(t==='measure') geoUpdateMeasures();
      };
      window.geoSendHint = function(){
        const inp=wbody.querySelector('#geoHintInput');
        const q=inp.value.trim(); if(!q) return;
        inp.value=''; geoAskAI(q);
      };

      function geoAskAI(question){
        window.geoSwitchTab('hints');
        const list=wbody.querySelector('#geoHintsList');
        const ucard=document.createElement('div'); ucard.className='geo-hint-card user-card';
        ucard.innerHTML=`<div class="geo-hint-tag user">YOU</div><div class="geo-hint-text">${question.replace(/</g,'&lt;')}</div>`;
        list.appendChild(ucard);
        const aicard=document.createElement('div'); aicard.className='geo-hint-card ai-card';
        aicard.innerHTML=`<div class="geo-hint-tag ai">✦ GEOSOLVE AI</div><div class="geo-thinking"><span></span><span></span><span></span></div>`;
        list.appendChild(aicard); aicard.scrollIntoView({behavior:'smooth'});
        // Build canvas summary
        const G=GEO_GRID, u=1/G;
        const summary = geo.shapes.length===0 ? 'Canvas is empty.' : geo.shapes.map((s,i)=>{
          const m=geoGetMeasurements(s);
          return (i+1)+'. '+(GEO_NAMES[s.type]||s.type)+': '+m.map(([k,v])=>k+'='+v).join(', ');
        }).join('\n');
        fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
          model:'claude-sonnet-4-6',max_tokens:1000,
          system:'You are GeoSolve AI, an expert geometry tutor. The user has drawn shapes on a canvas (1 unit = 20px). Provide helpful, educational answers. Wrap formulas in <formula>...</formula> tags.',
          messages:[{role:'user',content:'Canvas state:\n'+summary+'\n\nQuestion: '+question}]
        })})
        .then(r=>{if(!r.ok) throw new Error('api');return r.json();})
        .then(data=>{
          let text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
          if(!text) throw new Error('empty');
          geoRenderAI(aicard,text);
        })
        .catch(()=>{
          // Offline fallback
          const offText = geoOfflineEngine(question, geo.shapes, geo.selected, GEO_GRID);
          geoRenderAI(aicard, offText);
        });
      }

      function geoRenderAI(card, text){
        const regex=/<formula>([\s\S]*?)<\/formula>/g;
        let inner='', last=0, m;
        card.innerHTML=`<div class="geo-hint-tag ai">✦ GEOSOLVE AI</div>`;
        while((m=regex.exec(text))!==null){
          if(m.index>last) card.innerHTML+=`<div class="geo-hint-text">${text.slice(last,m.index).replace(/\n/g,'<br>')}</div>`;
          card.innerHTML+=`<div class="geo-hint-formula">${m[1].replace(/</g,'&lt;')}</div>`;
          last=m.index+m[0].length;
        }
        if(last<text.length) card.innerHTML+=`<div class="geo-hint-text">${text.slice(last).replace(/\n/g,'<br>')}</div>`;
        card.scrollIntoView({behavior:'smooth'});
      }

      function geoOfflineEngine(q, shapes, sel, G){
        const u=1/G;
        const ql=q.toLowerCase();
        if(!shapes.length) return 'Canvas is empty! Draw shapes first.';
        if(/area/i.test(ql) && sel){
          const m=geoGetMeasurements(sel);
          const arow=m.find(([k])=>k==='Area');
          if(arow) return 'Area of your '+GEO_NAMES[sel.type]+':\n<formula>A = '+arow[1]+'</formula>';
        }
        if(/perimeter|circumference/i.test(ql) && sel){
          const m=geoGetMeasurements(sel);
          const pr=m.find(([k])=>k==='Perimeter'||k==='Circumference');
          if(pr) return 'Perimeter of your '+GEO_NAMES[sel.type]+':\n<formula>P = '+pr[1]+'</formula>';
        }
        if(/angle|degrees?/i.test(ql) && sel && sel.type==='triangle'){
          const m=geoGetMeasurements(sel);
          const angles=m.filter(([k])=>k.startsWith('Angle'));
          return 'Angles of your triangle:\n'+angles.map(([k,v])=>`${k}: <formula>${v}</formula>`).join('\n');
        }
        // General analysis
        let resp='Canvas analysis:\n\n';
        shapes.forEach((s,i)=>{
          const m=geoGetMeasurements(s);
          resp+=`${GEO_NAMES[s.type]||s.type} #${i+1}:\n`;
          m.forEach(([k,v])=>{resp+=`  • ${k}: ${v}\n`;});
          resp+='\n';
        });
        return resp;
      }

      // ── MOUSE EVENTS ────
      function geoGetXY(e){
        const r=geoCanvas.getBoundingClientRect();
        return{x:geoSnap(e.clientX-r.left), y:geoSnap(e.clientY-r.top)};
      }
      function geoHitShape(s,x,y){
        const T=8;
        function dSeg(px,py,x1,y1,x2,y2){const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;if(!l2)return Math.hypot(px-x1,py-y1);const t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/l2));return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));}
        function inPoly(x,y,pts){let ins=false;for(let i=0,j=pts.length-1;i<pts.length;j=i++){const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))ins=!ins;}return ins;}
        if(s.type==='line'||s.type==='measure') return dSeg(x,y,s.x1,s.y1,s.x2,s.y2)<T;
        if(s.type==='rect') return x>=s.x1-T&&x<=s.x2+T&&y>=s.y1-T&&y<=s.y2+T;
        if(s.type==='circle'){const d=Math.hypot(x-s.cx,y-s.cy);return Math.abs(d-s.r)<T;}
        if(s.type==='triangle'||s.type==='polygon') return inPoly(x,y,s.pts);
        if(s.type==='text') return x>=s.x-T&&x<=s.x+100&&y>=s.y-16&&y<=s.y+T;
        return false;
      }
      function geoShapeCenter(s){
        if(s.type==='line'||s.type==='measure') return{x:(s.x1+s.x2)/2,y:(s.y1+s.y2)/2};
        if(s.type==='rect') return{x:(s.x1+s.x2)/2,y:(s.y1+s.y2)/2};
        if(s.type==='circle') return{x:s.cx,y:s.cy};
        if(['triangle','polygon','angle'].includes(s.type)){const xs=s.pts.map(p=>p.x),ys=s.pts.map(p=>p.y);return{x:(Math.min(...xs)+Math.max(...xs))/2,y:(Math.min(...ys)+Math.max(...ys))/2};}
        if(s.type==='text') return{x:s.x,y:s.y};
        return{x:0,y:0};
      }
      function geoMoveShape(s,cx,cy){
        const c=geoShapeCenter(s),dx=cx-c.x,dy=cy-c.y;
        if(s.type==='line'||s.type==='measure'){s.x1+=dx;s.y1+=dy;s.x2+=dx;s.y2+=dy;}
        else if(s.type==='rect'){s.x1+=dx;s.y1+=dy;s.x2+=dx;s.y2+=dy;}
        else if(s.type==='circle'){s.cx+=dx;s.cy+=dy;}
        else if(['triangle','polygon','angle'].includes(s.type)) s.pts=s.pts.map(p=>({x:p.x+dx,y:p.y+dy}));
        else if(s.type==='text'){s.x+=dx;s.y+=dy;}
      }
      geoCanvas.addEventListener('mousedown',e=>{
        const {x,y}=geoGetXY(e);
        if(geo.tool==='select'){
          let hit=null;
          for(let i=geo.shapes.length-1;i>=0;i--){if(geoHitShape(geo.shapes[i],x,y)){hit=geo.shapes[i];break;}}
          geo.selected=hit||null;
          if(hit){const c=geoShapeCenter(hit);geo.dragOffX=x-c.x;geo.dragOffY=y-c.y;}
          geoUpdateShapes();geoUpdateMeasures();geoRedraw();return;
        }
        if(geo.tool==='angle'){
          geo.anglePoints.push({x,y});
          if(geo.anglePoints.length===3){
            geo.shapes.push({type:'angle',pts:[...geo.anglePoints],color:geo.color,sw:geo.strokeWidth});
            geo.anglePoints=[];geoUpdateShapes();
          }
          geoRedraw();return;
        }
        if(geo.tool==='text'){
          const label=prompt('Enter label:'); if(label) geo.shapes.push({type:'text',x,y,text:label,color:geo.color});
          geoUpdateShapes();geoRedraw();return;
        }
        geo.drawing=true; geo.sx=x; geo.sy=y;
      });
      geoCanvas.addEventListener('mousemove',e=>{
        const {x,y}=geoGetXY(e);
        geo.mx=x; geo.my=y;
        wbody.querySelector('#geoCoords').textContent='x:'+x+' y:'+y;
        if(geo.drawing){geoRedraw();return;}
        if(geo.tool==='select'&&e.buttons===1&&geo.selected){
          geoMoveShape(geo.selected,x-geo.dragOffX,y-geo.dragOffY);
          geoUpdateMeasures(); geoRedraw();
        }
      });
      geoCanvas.addEventListener('mouseup',e=>{
        if(!geo.drawing) return; geo.drawing=false;
        const {x,y}=geoGetXY(e);
        if(Math.abs(x-geo.sx)<2&&Math.abs(y-geo.sy)<2){geoRedraw();return;}
        let s=null;
        const G=GEO_GRID;
        if(geo.tool==='line') s={type:'line',x1:geo.sx,y1:geo.sy,x2:x,y2:y};
        else if(geo.tool==='rect'){const[rx,ry]=[Math.min(geo.sx,x),Math.min(geo.sy,y)];s={type:'rect',x1:rx,y1:ry,x2:Math.max(geo.sx,x),y2:Math.max(geo.sy,y)};}
        else if(geo.tool==='circle'){const r=Math.hypot(x-geo.sx,y-geo.sy);if(r>3)s={type:'circle',cx:geo.sx,cy:geo.sy,r};}
        else if(geo.tool==='triangle'){const mx2=(geo.sx+x)/2;s={type:'triangle',pts:[{x:mx2,y:geo.sy},{x,y},{x:geo.sx,y}]};}
        else if(geo.tool==='polygon'){const n=+wbody.querySelector('#geoPolyN').value||6;const r=Math.hypot(x-geo.sx,y-geo.sy);const pts=[];for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2-Math.PI/2;pts.push({x:geo.sx+r*Math.cos(a),y:geo.sy+r*Math.sin(a)});}s={type:'polygon',pts,sides:n};}
        else if(geo.tool==='measure') s={type:'measure',x1:geo.sx,y1:geo.sy,x2:x,y2:y};
        if(s){s.color=geo.color;s.sw=geo.strokeWidth;geo.shapes.push(s);geo.selected=s;geoUpdateShapes();geoUpdateMeasures();}
        geoRedraw();
      });
      geoCanvas.addEventListener('mouseleave',()=>{geo.drawing=false;geoRedraw();});

      geoUpdateShapes(); geoUpdateMeasures();
    }
  });
}
