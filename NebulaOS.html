      });

      // ── Volume ───────────────────────────────────────────
      wbody.querySelector('#musicVol').addEventListener('input', e=>{ audio.volume=e.target.value/100; });

      // ── Shuffle/Repeat ───────────────────────────────────
      wbody.querySelector('#mcShuffle').addEventListener('click', ()=>{
        shuffle=!shuffle;
        wbody.querySelector('#mcShuffle').style.color=shuffle?'var(--accent2)':'';
      });
      wbody.querySelector('#mcRepeat').addEventListener('click', ()=>{
        repeat=!repeat; audio.loop=repeat;
        wbody.querySelector('#mcRepeat').style.color=repeat?'var(--accent2)':'';
      });

      // ── Prev / Next ──────────────────────────────────────
      wbody.querySelector('#mcPrev').addEventListener('click', ()=>{
        if(audio.currentTime>3){ audio.currentTime=0; return; }
        cur=(cur-1+playlist.length)%playlist.length; loadTrack(cur); audio.play();
      });
      wbody.querySelector('#mcNext').addEventListener('click', ()=>{
        nextTrack();
      });

      // ── Play/Pause ───────────────────────────────────────
      playBtn.addEventListener('click', ()=>{
        if(!playlist.length) return;
        if(audio.paused) audio.play(); else audio.pause();
      });

      // ── Audio events ─────────────────────────────────────
      audio.addEventListener('play',  ()=>{ playBtn.textContent='⏸'; artEl.classList.add('playing'); showVis(); });
      audio.addEventListener('pause', ()=>{ playBtn.textContent='▶'; artEl.classList.remove('playing'); });
      audio.addEventListener('ended', ()=>{ nextTrack(); });
      audio.addEventListener('timeupdate', ()=>{
        if(!audio.duration) return;
        const pct=(audio.currentTime/audio.duration)*100;
        progEl.value=pct;
        elapsedEl.textContent=fmt(audio.currentTime);
      });
      audio.addEventListener('loadedmetadata', ()=>{
        totalEl.textContent=fmt(audio.duration);
      });
      audio.addEventListener('error', ()=>{
        titleEl.textContent='⚠ Could not play this file';
      });

      // ── Visualizer bars (CSS animation trick — no AudioContext needed) ────
      function showVis(){
        visWrap.style.opacity='1';
        if(visWrap.children.length) return;
        for(let i=0;i<18;i++){
          const b=document.createElement('div');
          b.style.cssText=`flex:1;background:linear-gradient(to top,var(--accent),var(--accent2));border-radius:2px 2px 0 0;min-height:3px;animation:visBar ${(0.4+Math.random()*0.6).toFixed(2)}s ease-in-out infinite alternate;animation-delay:${(Math.random()*0.3).toFixed(2)}s;`;
          visWrap.appendChild(b);
        }
        // inject keyframes if not present
        if(!document.getElementById('visBarKf')){
          const st=document.createElement('style'); st.id='visBarKf';
          st.textContent='@keyframes visBar{from{height:5%}to{height:'+(30+Math.random()*50).toFixed(0)+'%}}';
          document.head.appendChild(st);
        }
      }

      // ── Next track logic ─────────────────────────────────
      function nextTrack(){
        if(!playlist.length) return;
        if(shuffle) cur=Math.floor(Math.random()*playlist.length);
        else cur=(cur+1)%playlist.length;
        loadTrack(cur); audio.play();
      }

      // ── Load a track ─────────────────────────────────────
      function loadTrack(i){
        cur=i;
        const t=playlist[i];
        audio.src=t.url;
        // Display name: strip extension
        const name=t.name.replace(/\.\w+$/, '');
        titleEl.textContent=name;
        artistEl.textContent=t.name;
        totalEl.textContent='...';
        elapsedEl.textContent='0:00';
        progEl.value=0;
        // Pick emoji based on index
        const emojis=['🎵','🎶','🎸','🎹','🥁','🎷','🎺','🎻','🪗','🎤'];
        artEl.childNodes[0].textContent=emojis[i%emojis.length];
        // Highlight in playlist
        wbody.querySelectorAll('.pl-item').forEach((el,j)=>el.classList.toggle('active',j===i));
      }

      // ── File input ───────────────────────────────────────
      wbody.querySelector('#muFileIn').addEventListener('change', e=>{
        const files=[...e.target.files];
        if(!files.length) return;
        // Revoke old object URLs
        playlist.forEach(t=>{ if(t.url.startsWith('blob:')) URL.revokeObjectURL(t.url); });
        playlist=[...playlist, ...files.map(f=>({name:f.name, url:URL.createObjectURL(f)}))];
        rebuildPlaylist();
        // Auto-play first new track if nothing was playing
        if(playlist.length===files.length){ loadTrack(0); audio.play(); }
      });

      // ── Rebuild playlist DOM ─────────────────────────────
      function rebuildPlaylist(){
        plTitle.textContent='PLAYLIST ('+playlist.length+')';
        plItems.innerHTML='';
        playlist.forEach((t,i)=>{
          const el=document.createElement('div');
          el.className='pl-item'+(i===cur?' active':'');
          const name=t.name.replace(/\.\w+$/, '');
          const emojis=['🎵','🎶','🎸','🎹','🥁','🎷','🎺','🎻','🪗','🎤'];
          el.innerHTML=`<span class="pl-num">${i+1}</span>
            <span style="font-size:16px">${emojis[i%emojis.length]}</span>
            <div class="pl-info"><div class="pl-title">${name}</div><div class="pl-artist" style="font-size:10px;color:var(--muted);">${t.name}</div></div>
            <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 5px;" onclick="event.stopPropagation();muRemove(${i})">✕</button>`;
          el.addEventListener('click', ()=>{ loadTrack(i); audio.play(); });
          plItems.appendChild(el);
        });
        if(!playlist.length){
          plItems.innerHTML='<div style="text-align:center;padding:24px 12px;color:var(--muted);font-size:11.5px;line-height:1.7;">No tracks yet.<br>Click <strong style="color:var(--text)">+ Add Files</strong> to open<br>MP3, WAV, FLAC, OGG and more.</div>';
        }
      }

      window.muRemove=function(i){
        if(playlist[i].url.startsWith('blob:')) URL.revokeObjectURL(playlist[i].url);
        playlist.splice(i,1);
        if(cur>=playlist.length) cur=Math.max(0,playlist.length-1);
        if(playlist.length){ loadTrack(cur); } else { audio.pause(); audio.src=''; titleEl.textContent='No track loaded'; artistEl.textContent='Open audio files to begin'; }
        rebuildPlaylist();
      };

      // Cleanup on close
      const winEl=wbody.closest ? wbody.closest('.window') : null;
      if(winEl) winEl.querySelector('.winbtn.close')?.addEventListener('click',()=>{
        audio.pause(); playlist.forEach(t=>{ if(t.url.startsWith('blob:')) URL.revokeObjectURL(t.url); });
      });
    }
  });
}

/* ---------------------------- DOCK (macOS-style) ---------------------------- */
function buildDock(){
  const dock = document.getElementById('dock');
  const icons = APPS.map(app=>{
    const el = document.createElement('div');
    el.className='dock-icon';
    el.innerHTML = `${app.icon}<span class="dot"></span><span class="dock-tip">${app.name}</span>`;
    el.addEventListener('click', ()=>{
      app.fn();
      el.classList.add('running');
      el.style.transform += ' translateY(-2px)';
      setTimeout(()=>{ el.style.transform = el.style.transform.replace(' translateY(-2px)',''); }, 140);
    });
    dock.appendChild(el);
    return el;
  });

  // macOS-style proximity magnification
  dock.addEventListener('mousemove', (e)=>{
    const rect = dock.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    icons.forEach(icon=>{
      const ir = icon.getBoundingClientRect();
      const iconCenter = (ir.left - rect.left) + ir.width/2;
      const dist = Math.abs(mouseX - iconCenter);
      const maxDist = 110, maxScale = 1.55, minScale = 1;
      const scale = dist > maxDist ? minScale : minScale + (maxScale-minScale) * (1 - dist/maxDist);
      icon.style.transform = `scale(${scale.toFixed(2)})`;
      icon.style.zIndex = Math.round(scale*10);
    });
  });
  dock.addEventListener('mouseleave', ()=>{
    icons.forEach(icon=> icon.style.transform = 'scale(1)');
  });

  // reflect running state in both dock and taskbar buttons
  setInterval(()=>{
    const openTitles = Array.from(document.querySelectorAll('.taskApp span:nth-child(2)')).map(s=>s.textContent.toLowerCase());
    icons.forEach((icon,i)=>{
      const name = APPS[i].name.toLowerCase();
      const isOpen = openTitles.some(t=> t.includes(name) || name.includes(t));
      icon.classList.toggle('running', isOpen);
      const tbBtn = document.getElementById('tbapp-'+APPS[i].id);
      if(tbBtn) tbBtn.classList.toggle('running', isOpen);
    });
  }, 800);
}

/* ---------------------------- SYSTEM MONITOR (CPU/GPU widgets) ---------------------------- */
const SystemMonitor = (() => {
  const HISTORY_LEN = 60;
  let cpuHist = new Array(HISTORY_LEN).fill(0);
  let gpuHist = new Array(HISTORY_LEN).fill(0);
  let gpuPhase = Math.random()*10;
  let cpuPeak = 0, gpuPeak = 0;

  function sampleCpu(){
    const procs = Kernel.list();
    const total = procs.reduce((a,p)=>a+p.cpu,0);
    return Math.max(0, Math.min(100, total));
  }
  function sampleGpu(){
    gpuPhase += 0.18 + Math.random()*0.05;
    const hasBrowser = Kernel.list().some(p=>p.name.includes('browser'));
    const base = 8 + Math.sin(gpuPhase)*6 + Math.random()*5;
    return Math.max(2, Math.min(100, base + (hasBrowser? 18:0)));
  }

  function drawSpark(canvas, hist, color, fill){
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    const max = 100;
    const step = w / (hist.length-1);
    ctx.beginPath();
    hist.forEach((v,i)=>{
      const x = i*step, y = h - (v/max)*h;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.strokeStyle = color; ctx.lineWidth = 1.6; ctx.lineJoin='round'; ctx.stroke();
    if(fill){
      ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
      const grad = ctx.createLinearGradient(0,0,0,h);
      grad.addColorStop(0, color+'55'); grad.addColorStop(1, color+'00');
      ctx.fillStyle = grad; ctx.fill();
    }
  }

  function pad2(hex){ return hex; }

  function tick(){
    const cpu = sampleCpu(), gpu = sampleGpu();
    cpuHist.push(cpu); cpuHist.shift();
    gpuHist.push(gpu); gpuHist.shift();
    cpuPeak = Math.max(cpuPeak*0.995, cpu);
    gpuPeak = Math.max(gpuPeak*0.995, gpu);

    // menu bar mini meters
    const mbCpuCanvas = document.querySelector('#mb-cpu canvas');
    const mbGpuCanvas = document.querySelector('#mb-gpu canvas');
    if(mbCpuCanvas) drawSpark(mbCpuCanvas, cpuHist.slice(-20), '#7c5cff', false);
    if(mbGpuCanvas) drawSpark(mbGpuCanvas, gpuHist.slice(-20), '#00d9c0', false);
    const mbCpuVal = document.querySelector('#mb-cpu .mb-val'); if(mbCpuVal) mbCpuVal.textContent = Math.round(cpu)+'%';
    const mbGpuVal = document.querySelector('#mb-gpu .mb-val'); if(mbGpuVal) mbGpuVal.textContent = Math.round(gpu)+'%';

    // widget panel big graphs
    const wCpuCanvas = document.getElementById('w-cpu-canvas');
    const wGpuCanvas = document.getElementById('w-gpu-canvas');
    if(wCpuCanvas){
      wCpuCanvas.width = wCpuCanvas.clientWidth; wCpuCanvas.height = 120;
      drawSpark(wCpuCanvas, cpuHist, '#7c5cff', true);
    }
    if(wGpuCanvas){
      wGpuCanvas.width = wGpuCanvas.clientWidth; wGpuCanvas.height = 120;
      drawSpark(wGpuCanvas, gpuHist, '#00d9c0', true);
    }
    const wCpuVal = document.getElementById('w-cpu-val'); if(wCpuVal) wCpuVal.textContent = Math.round(cpu)+'%';
    const wGpuVal = document.getElementById('w-gpu-val'); if(wGpuVal) wGpuVal.textContent = Math.round(gpu)+'%';
    const wCpuProcs = document.getElementById('w-cpu-procs'); if(wCpuProcs) wCpuProcs.textContent = Kernel.list().length+' processes';
    const wCpuPeak = document.getElementById('w-cpu-peak'); if(wCpuPeak) wCpuPeak.textContent = 'peak '+Math.round(cpuPeak)+'%';
    const wGpuPeak = document.getElementById('w-gpu-peak'); if(wGpuPeak) wGpuPeak.textContent = 'peak '+Math.round(gpuPeak)+'%';
  }

  function start(){ tick(); setInterval(tick, 1000); }
  function currentCpu(){ return cpuHist[cpuHist.length-1]; }
  function currentGpu(){ return gpuHist[gpuHist.length-1]; }

  return { start, currentCpu, currentGpu };
})();

function wireWidgetPanel(){
  const panel = document.getElementById('widgetPanel');
  function toggle(e){ e.stopPropagation(); panel.style.display = panel.style.display==='block' ? 'none' : 'block'; }
  document.getElementById('mb-cpu').addEventListener('click', toggle);
  document.getElementById('mb-gpu').addEventListener('click', toggle);
  document.addEventListener('click', (e)=>{
    if(panel.style.display==='block' && !panel.contains(e.target) && e.target.id!=='mb-cpu' && e.target.id!=='mb-gpu'){
      panel.style.display='none';
    }
  });
  panel.addEventListener('click', e=>e.stopPropagation());
}

document.getElementById('startBtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  const m = document.getElementById('startMenu');
  m.style.display = m.style.display==='block' ? 'none' : 'block';
});
document.addEventListener('click', ()=>{ document.getElementById('startMenu').style.display='none'; });
document.getElementById('startMenu').addEventListener('click', e=>e.stopPropagation());
document.getElementById('lockItem').addEventListener('click', ()=>{
  document.getElementById('startMenu').style.display='none';
  Auth.lock();
});

function tickClock(){
  const d = new Date();
  const s = d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}) + ' · ' + d.toLocaleDateString();
  document.getElementById('clock').textContent = s;
  const sc = document.getElementById('startClock'); if(sc) sc.textContent = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const mb = document.getElementById('mb-clock'); if(mb) mb.textContent = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'}) + '  ' + d.toLocaleDateString([],{month:'short',day:'numeric'});
}
setInterval(tickClock, 1000); tickClock();

/* ---------------------------- BOOT SEQUENCE ---------------------------- */
function boot(){
  const lines = [
    '[ OK ] Starting nebkrnl 6.6.0-sim ...',
    '[ OK ] Mounting virtual filesystem at /',
    '[ OK ] Initializing process table',
    '[ OK ] Starting window manager service',
    '[ OK ] Loading user session: user',
    '[ OK ] Starting shell (nebbash) ...',
    '[ OK ] Welcome to NebulaOS.'
  ];
  const logEl = document.getElementById('bootLog');
  let i=0;
  const iv = setInterval(()=>{
    if(i<lines.length){
      const d=document.createElement('div'); d.textContent=lines[i]; logEl.appendChild(d);
      i++;
    } else {
      clearInterval(iv);
      setTimeout(()=>{
        document.getElementById('bootScreen').style.transition='opacity .5s';
        document.getElementById('bootScreen').style.opacity='0';
        setTimeout(()=> document.getElementById('bootScreen').remove(), 500);
      }, 400);
    }
  }, 220);
}

/* ---------------------------- AUTH / LOGIN ---------------------------- */
const Auth = (() => {
  const STORE_KEY = 'nebulaos_auth_v1';

  async function sha256(text){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  function getRecord(){
    try{ const raw = localStorage.getItem(STORE_KEY); return raw ? JSON.parse(raw) : null; }
    catch(e){ return null; }
  }
  function setRecord(rec){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(rec)); }catch(e){}
  }
  function clearRecord(){
    try{ localStorage.removeItem(STORE_KEY); }catch(e){}
  }

  const card = document.getElementById('authCard');
  const screen = document.getElementById('authScreen');

  function showScreen(){ screen.style.display='flex'; }
  function hideScreen(){ screen.style.display='none'; }

  function renderSetup(onDone){
    card.innerHTML = `
      <div class="avatar">🧑‍🚀</div>
      <h2>Welcome to NebulaOS</h2>
      <div class="sub">Create a password to protect your session</div>
      <input id="setup-user" type="text" placeholder="Username" value="user" autocomplete="off"/>
      <input id="setup-pw" type="password" placeholder="New password" autocomplete="new-password"/>
      <div class="strengthBar"><div id="setup-strength"></div></div>
      <input id="setup-pw2" type="password" placeholder="Confirm password" autocomplete="new-password"/>
      <button class="primary" id="setup-go">Create account & continue</button>
      <div class="authErr" id="setup-err"></div>
      <div class="authHint">Stored only in this browser (hashed, never in plaintext). Resetting clears it.</div>
    `;
    const pwInput = card.querySelector('#setup-pw');
    const strength = card.querySelector('#setup-strength');
    const colors = ['#ff605c','#ff9a44','#ffd24a','#8effa1','#00d9c0'];
    pwInput.addEventListener('input', ()=>{
      if(!pwInput.value){ strength.style.width='0%'; return; }
      const r = analyzePassword(pwInput.value);
      strength.style.width = ((r.score+1)/5*100)+'%';
      strength.style.background = colors[r.score];
    });
    const err = card.querySelector('#setup-err');
    async function go(){
      const user = card.querySelector('#setup-user').value.trim() || 'user';
      const pw = card.querySelector('#setup-pw').value;
      const pw2 = card.querySelector('#setup-pw2').value;
      if(pw.length < 4){ err.textContent = 'Password must be at least 4 characters.'; return; }
      if(pw !== pw2){ err.textContent = 'Passwords do not match.'; return; }
      const hash = await sha256(pw);
      setRecord({user, hash});
      onDone(user);
    }
    card.querySelector('#setup-go').onclick = go;
    card.querySelectorAll('#setup-pw2').forEach(i=> i.addEventListener('keydown', e=>{ if(e.key==='Enter') go(); }));
  }

  function renderLogin(rec, onDone){
    card.innerHTML = `
      <div class="avatar">🧑‍🚀</div>
      <h2>${rec.user}</h2>
      <div class="sub">Enter your password to unlock NebulaOS</div>
      <input id="login-pw" type="password" placeholder="Password" autocomplete="current-password"/>
      <button class="primary" id="login-go">Unlock</button>
      <div class="authErr" id="login-err"></div>
      <div class="authHint">Forgot it? <span class="authLink" id="login-reset">Reset NebulaOS</span> (erases saved password &amp; virtual files)</div>
    `;
    const err = card.querySelector('#login-err');
    const pwInput = card.querySelector('#login-pw');
    async function go(){
      const hash = await sha256(pwInput.value);
      if(hash === rec.hash){ onDone(rec.user); }
      else { err.textContent = 'Incorrect password.'; pwInput.value=''; pwInput.focus(); }
    }
    card.querySelector('#login-go').onclick = go;
    pwInput.addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });
    card.querySelector('#login-reset').onclick = ()=>{
      if(confirm('Reset NebulaOS? This clears your saved password and reloads the page.')){
        clearRecord(); location.reload();
      }
    };
    setTimeout(()=>pwInput.focus(), 50);
  }

  function start(onAuthenticated){
    showScreen();
    const rec = getRecord();
    if(rec){
      renderLogin(rec, (user)=>{ hideScreen(); onAuthenticated(user); });
    } else {
      renderSetup((user)=>{ hideScreen(); onAuthenticated(user); });
    }
  }

  function lock(){
    const rec = getRecord();
    if(!rec) return;
    showScreen();
    renderLogin(rec, ()=>{ hideScreen(); });
  }

  return { start, lock, clearRecord };
})();

buildDesktopIcons();
buildStartMenu();
buildDock();
wireWidgetPanel();
SystemMonitor.start();
// Always start fresh — clear any stored session so setup screen shows
try { localStorage.removeItem('nebulaos_auth_v1'); } catch(e) {}
Auth.start(()=>{ document.getElementById('bootScreen').style.display='flex'; boot(); });
</script>
